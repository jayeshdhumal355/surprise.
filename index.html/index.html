<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Proposal | Crown_JD</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            /* मोबाईलवर चालणारा स्मूथ रेंबो बॅकग्राउंड */
            background: linear-gradient(-45deg, #ff2400, #dd00f3, #1ddde8, #1de840);
            background-size: 400% 400%;
            animation: rainbow 10s ease infinite;
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            width: 90%;
            max-width: 400px;
            z-index: 10;
            position: relative; 
            min-height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .made-by { 
            font-size: 10px; 
            color: #ff4d6d; 
            letter-spacing: 2px; 
            margin-bottom: 20px; 
            font-weight: bold; 
            position: absolute; 
            top: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
        }

        h2 { color: #333; font-size: 20px; line-height: 1.5; margin-bottom: 40px; }
        .highlight { color: #ff4d6d; font-family: 'Great Vibes', cursive; font-size: 32px; display: block; margin-top: 10px; }
        
        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
            position: relative;
            height: 60px;
        }

        button {
            padding: 12px 35px;
            font-size: 18px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            touch-action: manipulation;
        }

        #yesBtn { background: #ff4d6d; color: white; box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4); }
        #noBtn { 
            background: #555; 
            color: white; 
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2); 
            z-index: 100;
        }
        
        .hidden { display: none; }
        .big-heart { font-size: 80px; animation: beat 0.8s infinite alternate; }
        @keyframes beat { to { transform: scale(1.2); } }
    </style>
</head>
<body>

    <div class="card" id="mainCard">
        <p class="made-by">Created by Crown_JD</p>
        <div id="proposalContent">
            <h2>I've been waiting for the right time to ask... 
                <span class="highlight">Will you be mine? ❤️</span>
            </h2>
            <div class="btn-container" id="btnWrapper">
                <button id="yesBtn" onclick="celebrate()">Yes</button>
                <button id="noBtn" onmouseover="moveButton()" ontouchstart="moveButton()">No</button>
            </div>
        </div>

        <div id="result" class="hidden">
            <div class="big-heart">💖</div>
            <h2 style="color: #ff4d6d; font-size: 26px;">You made my day! ❤️</h2>
            <p style="font-size: 18px; color: #444; margin-top: 10px;">
                I promise to keep this smile <br> on your face forever. ✨
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <script>
        const noBtn = document.getElementById('noBtn');

        function moveButton() {
            noBtn.style.position = 'fixed'; 
            
            // मोबाईल स्क्रीनच्या हिशोबाने सुरक्षित मार्जिन
            const margin = 60; 
            const maxX = window.innerWidth - noBtn.offsetWidth - margin;
            const maxY = window.innerHeight - noBtn.offsetHeight - margin;
            
            let randomX = Math.floor(Math.random() * maxX);
            let randomY = Math.floor(Math.random() * maxY);

            // बटण स्क्रीनच्या बाहेर जाणार नाही याची खात्री
            randomX = Math.max(margin, randomX);
            randomY = Math.max(margin, randomY);
            
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function celebrate() {
            document.getElementById('proposalContent').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
            noBtn.style.display = 'none';

            var end = Date.now() + (5 * 1000);
            (function frame() {
                confetti({
                    particleCount: 10,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff4d6d', '#ffffff', '#ffd700']
                });
                confetti({
                    particleCount: 10,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#ff4d6d', '#ffffff', '#ffd700']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
